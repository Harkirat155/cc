name: CI Frontend

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'vite.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-frontend.yml'

permissions:
  contents: read

concurrency:
  group: ci-frontend
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # PRs from forks cannot access secrets; use a safe placeholder
      - name: Set backend URL placeholder
        run: echo "VITE_SOCKET_SERVER=" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm install

      - name: Lint (if present)
        run: npm run lint --if-present

      - name: Run unit tests (if present)
        env:
          # Ensure jsdom is available for React Testing Library tests if configured
          NODE_ENV: test
        run: npm run test --if-present

      - name: Build frontend
        run: npm run build